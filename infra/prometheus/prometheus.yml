global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  - job_name: api
    static_configs:
      - targets: ["api:4000"]
    metrics_path: /metrics

  - job_name: scheduler
    static_configs:
      - targets: ["scheduler:4100"]
    metrics_path: /metrics

  - job_name: runner
    static_configs:
      - targets: ["runner:4200"]
    metrics_path: /metrics

  - job_name: alerting
    static_configs:
      - targets: ["alerting:4300"]
    metrics_path: /metrics

  - job_name: rum-collector
    static_configs:
      - targets: ["rum-collector:4400"]
    metrics_path: /metrics
