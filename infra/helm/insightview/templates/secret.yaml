{{/* K8s secret holding the API bearer token and the Postgres URL. */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "insightview.fullname" . }}-secret
  labels:
    {{- include "insightview.labels" . | nindent 4 }}
type: Opaque
stringData:
  databaseUrl: {{ .Values.database.url | quote }}
{{- if .Values.apiToken }}
  apiToken: {{ .Values.apiToken | quote }}
{{- end }}
