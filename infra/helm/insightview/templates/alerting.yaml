apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insightview.fullname" . }}-alerting
  labels:
    {{- include "insightview.labels" . | nindent 4 }}
    app.kubernetes.io/component: alerting
spec:
  replicas: {{ .Values.alerting.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: insightview
      app.kubernetes.io/component: alerting
  template:
    metadata:
      labels:
        {{- include "insightview.labels" . | nindent 8 }}
        app.kubernetes.io/component: alerting
    spec:
      containers:
        - name: alerting
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["pnpm", "--filter", "@insightview/alerting", "run", "start"]
          env:
            {{- include "insightview.env" . | nindent 12 }}
            - name: PORT
              value: "4300"
          ports:
            - name: http
              containerPort: 4300
          livenessProbe:
            httpGet: { path: /healthz, port: 4300 }
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.alerting.resources | nindent 12 }}
