{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "insightview.fullname" . }}
  labels:
    {{- include "insightview.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.hosts.api | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "insightview.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
    - host: {{ .Values.ingress.hosts.rum | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "insightview.fullname" . }}-rum-collector
                port:
                  number: {{ .Values.rumCollector.service.port }}
    - host: {{ .Values.ingress.hosts.dashboard | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "insightview.fullname" . }}-dashboard
                port:
                  number: {{ .Values.dashboard.service.port }}
    - host: {{ .Values.ingress.hosts.status | quote }}
      http:
        paths:
          - path: /v1/status
            pathType: Prefix
            backend:
              service:
                name: {{ include "insightview.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
{{- end }}
