apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insightview.fullname" . }}-scheduler
  labels:
    {{- include "insightview.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  replicas: {{ .Values.scheduler.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: insightview
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        {{- include "insightview.labels" . | nindent 8 }}
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: {{ include "insightview.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "insightview.podSecurityContext" . | nindent 8 }}
      containers:
        - name: scheduler
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- include "insightview.containerSecurityContext" . | nindent 12 }}
          args: ["pnpm", "--filter", "@insightview/scheduler", "run", "start"]
          env:
            {{- include "insightview.env" . | nindent 12 }}
            - name: PORT
              value: "4100"
          ports:
            - name: http
              containerPort: 4100
          readinessProbe:
            httpGet: { path: /healthz, port: 4100 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 4100 }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}
