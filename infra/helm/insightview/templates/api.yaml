apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insightview.fullname" . }}-api
  labels:
    {{- include "insightview.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: insightview
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "insightview.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["pnpm", "--filter", "@insightview/api", "run", "start"]
          ports:
            - name: http
              containerPort: 4000
          env:
            {{- include "insightview.env" . | nindent 12 }}
            - name: PORT
              value: "4000"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insightview.fullname" . }}-api
  labels:
    {{- include "insightview.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: 4000
  selector:
    app.kubernetes.io/name: insightview
    app.kubernetes.io/component: api
