apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insightview.fullname" . }}-runner
  labels:
    {{- include "insightview.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
spec:
  replicas: {{ .Values.runner.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: insightview
      app.kubernetes.io/component: runner
  template:
    metadata:
      labels:
        {{- include "insightview.labels" . | nindent 8 }}
        app.kubernetes.io/component: runner
    spec:
      serviceAccountName: {{ include "insightview.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "insightview.podSecurityContext" . | nindent 8 }}
      containers:
        - name: runner
          image: "{{ .Values.image.repository }}-runner:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Playwright/Chromium needs writable /tmp + needs the Linux
          # capability to set sandbox flags via clone(); we drop ALL
          # other capabilities and stay non-root via the pod-level
          # securityContext. readOnlyRootFilesystem is left unset so
          # the browser can write its scratch files.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          args: ["pnpm", "--filter", "@insightview/runner", "run", "start"]
          env:
            {{- include "insightview.env" . | nindent 12 }}
            - name: PORT
              value: "4200"
            - name: RUNNER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: 4200
          readinessProbe:
            httpGet: { path: /healthz, port: 4200 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 4200 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.runner.resources | nindent 12 }}
