# Default values for the InsightView chart. Override in
# `values.production.yaml` or via `helm upgrade --set ...`.

image:
  repository: ghcr.io/abhitall/insightview
  tag: latest
  pullPolicy: IfNotPresent

# Event bus backend. `kafka` requires a Kafka broker; `bullmq`
# uses the bundled Redis.
eventBus:
  backend: bullmq # bullmq | kafka
  redisUrl: redis://redis:6379
  kafkaBrokers: kafka:9092

# Database connection. By default the chart does NOT deploy
# Postgres — point at an existing managed instance (RDS, Cloud
# SQL, etc.) via databaseUrl.
database:
  url: postgres://insightview:insightview@postgres:5432/insightview

# Observability
otel:
  enabled: false
  exporterEndpoint: http://otel-collector:4318/v1/traces

# Auth
apiToken: "" # when set, all non-health routes require Bearer auth

# Replica counts — default minimal, scale based on traffic.
api:
  replicas: 2
  service:
    type: ClusterIP
    port: 4000
  resources:
    requests: { cpu: "200m", memory: "256Mi" }
    limits: { cpu: "1000m", memory: "512Mi" }

scheduler:
  replicas: 2 # both replicas run but only the leader schedules
  resources:
    requests: { cpu: "100m", memory: "128Mi" }

runner:
  replicas: 3 # horizontal for throughput
  resources:
    requests: { cpu: "1000m", memory: "2Gi" }
    limits: { cpu: "2000m", memory: "4Gi" }

alerting:
  replicas: 2
  resources:
    requests: { cpu: "100m", memory: "128Mi" }

rumCollector:
  replicas: 3
  service:
    type: ClusterIP
    port: 4400
  resources:
    requests: { cpu: "200m", memory: "256Mi" }

dashboard:
  replicas: 2
  service:
    type: ClusterIP
    port: 5173

ingress:
  enabled: false
  className: nginx
  hosts:
    api: api.insightview.example.com
    rum: rum.insightview.example.com
    dashboard: dashboard.insightview.example.com
    status: status.insightview.example.com
