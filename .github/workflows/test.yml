name: Test Action

# Validates the composite action.yml against the legacy Playwright path.
# Uses the official Playwright container so browsers are pre-installed
# and command: legacy-run works immediately.

on:
  pull_request:
    paths:
      - "action.yml"
      - "apps/runner/**"
      - "apps/action-dispatcher/**"
      - "package.json"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

jobs:
  test-legacy-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.51.0-noble
      options: --user 1001 --ipc=host
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Run legacy synthetic path via composite action
        uses: ./
        with:
          command: legacy-run
          test_url: "https://example.com"
          browser: "chromium"
