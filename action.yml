name: "InsightView"
description: "InsightView monitoring platform - trigger runs, deploy monitors-as-code, validate YAML, and run the legacy Playwright synthetic flow from GitHub Actions."
branding:
  icon: "activity"
  color: "blue"

inputs:
  command:
    description: "Command: run | deploy | validate | status | legacy-run"
    required: false
    default: "legacy-run"

  # Platform inputs (used by run|deploy|validate|status)
  api_url:
    description: "InsightView API base URL (e.g. https://insightview.example.com)"
    required: false
  api_token:
    description: "Bearer token for API authentication"
    required: false
  check_name:
    description: "Check name to trigger (run) or query (status)"
    required: false
  monitors_path:
    description: "Directory containing monitors-as-code YAML files"
    required: false
    default: "monitors"
  wait:
    description: "For 'run': wait for the run to reach a terminal state (true/false)"
    required: false
    default: "true"

  # Legacy inputs (back-compat for command: legacy-run)
  test_url:
    description: "Target URL to test"
    required: false
  prometheus_pushgateway:
    description: "Prometheus Pushgateway URL"
    required: false
  aws_access_key_id:
    description: "AWS/S3 Access Key ID"
    required: false
  aws_secret_access_key:
    description: "AWS/S3 Secret Access Key"
    required: false
  aws_region:
    description: "AWS/S3 Region"
    required: false
  s3_bucket:
    description: "S3 Bucket name"
    required: false
  s3_endpoint:
    description: "S3 Endpoint URL (non-AWS)"
    required: false
  s3_force_path_style:
    description: "Use path-style S3 addressing"
    required: false
    default: "false"
  s3_tls_verify:
    description: "Verify TLS certificates for S3"
    required: false
    default: "true"
  minio_access_key:
    description: "MinIO Access Key"
    required: false
  minio_secret_key:
    description: "MinIO Secret Key"
    required: false
  minio_root_user:
    description: "MinIO Root User"
    required: false
  minio_root_password:
    description: "MinIO Root Password"
    required: false
  minio_endpoint:
    description: "MinIO Endpoint URL"
    required: false
  browser:
    description: "Browser to use for legacy Playwright tests"
    required: false
    default: "chromium"
  config_path:
    description: "Path to Playwright config file"
    required: false
    default: ""
  test_dir:
    description: "Directory containing test files"
    required: false
    default: ""
  env_vars:
    description: "JSON string of additional environment variables"
    required: false
    default: "{}"

outputs:
  run_id:
    description: "The run ID produced by 'command: run'"
    value: ${{ steps.dispatch.outputs.run_id }}
  run_status:
    description: "The terminal status produced by 'command: run'"
    value: ${{ steps.dispatch.outputs.run_status }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Enable pnpm
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@10.0.0 --activate

    - name: Install workspace dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: pnpm install --frozen-lockfile=false

    - name: Dispatch
      id: dispatch
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INSIGHTVIEW_API_URL: ${{ inputs.api_url }}
        INSIGHTVIEW_API_TOKEN: ${{ inputs.api_token }}
        INSIGHTVIEW_CHECK_NAME: ${{ inputs.check_name }}
        INSIGHTVIEW_MONITORS_PATH: ${{ inputs.monitors_path }}
        INSIGHTVIEW_WAIT: ${{ inputs.wait }}
        # Legacy env vars for command: legacy-run
        PROMETHEUS_PUSHGATEWAY: ${{ inputs.prometheus_pushgateway }}
        TEST_URL: ${{ inputs.test_url }}
        AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
        AWS_REGION: ${{ inputs.aws_region }}
        S3_BUCKET: ${{ inputs.s3_bucket }}
        S3_ENDPOINT: ${{ inputs.s3_endpoint }}
        S3_FORCE_PATH_STYLE: ${{ inputs.s3_force_path_style }}
        S3_TLS_VERIFY: ${{ inputs.s3_tls_verify }}
        MINIO_ACCESS_KEY: ${{ inputs.minio_access_key }}
        MINIO_SECRET_KEY: ${{ inputs.minio_secret_key }}
        MINIO_ROOT_USER: ${{ inputs.minio_root_user }}
        MINIO_ROOT_PASSWORD: ${{ inputs.minio_root_password }}
        MINIO_ENDPOINT: ${{ inputs.minio_endpoint }}
      run: |
        set -euo pipefail
        echo "InsightView Action command: ${{ inputs.command }}"
        if [ "${{ inputs.command }}" = "legacy-run" ]; then
          pnpm --filter @insightview/runner run legacy:test
        else
          pnpm --filter @insightview/action-dispatcher start -- ${{ inputs.command }}
        fi
